}

.container{
    max-width:700px;

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.card{
    background:white;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    overflow:hidden;
}

a.script{
    display:block;
    padding:18px 20px;
    text-decoration:none;
    color:#333;
    font-size:18px;
    border-bottom:1px solid #eee;
    transition:.2s;
}

a.script:last-child{
    border-bottom:none;
}

a.script:hover{
    background:#f0f7ff;
}

.date{
    font-weight:bold;
    color:#1976d2;
}

.desc{
    font-size:14px;
    color:#666;
    margin-top:5px;
}
</style>

</head>

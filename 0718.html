<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자립 퍼실리테이션 진행 대본</title>
<style>
  :root{
    --ink:#2b2620;
    --paper:#faf7f2;
    --card:#ffffff;
    --line:#e5ddd0;
    --accent:#8a6d4f;
    --accent-soft:#efe6d8;
    --sub:#7a7367;
    --ft:#5c7a6b;
    --ft-soft:#e8efe9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.55;
    padding-bottom:60px;
  }
  header{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--paper);
    padding:16px 18px 12px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-size:17px;
    margin:0 0 4px;
    letter-spacing:-0.2px;
  }
  header .meta{
    font-size:12.5px;
    color:var(--sub);
  }
  .controls{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .controls button{
    flex:1;
    font-size:12.5px;
    padding:8px 0;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
  }
  .controls button:active{
    background:var(--accent-soft);
  }
  main{
    padding:14px 12px 0;
  }
  .item{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .item.done{
    opacity:0.5;
  }
  .item-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    cursor:pointer;
  }
  .time-badge{
    flex:0 0 auto;
    font-size:11.5px;
    font-weight:600;
    color:var(--accent);
    background:var(--accent-soft);
    padding:5px 8px;
    border-radius:7px;
    white-space:nowrap;
    line-height:1.2;
    text-align:center;
  }
  .item-title{
    flex:1;
    font-size:14.5px;
    font-weight:600;
  }
  .item-title .dur{
    font-weight:400;
    color:var(--sub);
    font-size:12px;
    margin-left:4px;
  }
  .chevron{
    flex:0 0 auto;
    width:18px;
    height:18px;
    color:var(--sub);
    transition:transform .2s;
  }
  .item.open .chevron{
    transform:rotate(180deg);
  }
  .item-body{
    display:none;
    padding:0 14px 14px;
    border-top:1px solid var(--line);
  }
  .item.open .item-body{
    display:block;
  }
  .section-label{
    font-size:11px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:0.3px;
    margin:12px 0 5px;
  }
  .script{
    font-size:14px;
    white-space:pre-wrap;
    background:#fbf9f5;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
  }
  .ft-box{
    font-size:13px;
    white-space:pre-wrap;
    background:var(--ft-soft);
    color:#3f5147;
    border-radius:8px;
    padding:10px 12px;
    border:1px solid #d7e3da;
  }
  .ft-label{
    color:var(--ft);
  }
  .done-toggle{
    flex:0 0 auto;
    width:20px;
    height:20px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:var(--card);
  }
  .item.done .done-toggle{
    background:var(--accent);
    border-color:var(--accent);
  }
  footer{
    text-align:center;
    font-size:11.5px;
    color:var(--sub);
    padding:20px 0 0;
  }
</style>
</head>
<body>

<header>
  <h1>자립 퍼실리테이션 진행 대본</h1>
  <div class="meta">16:30 – 18:00 · 공동교류 프로그램</div>
  <div class="controls">
    <button onclick="toggleAll(true)">전체 펼치기</button>
    <button onclick="toggleAll(false)">전체 접기</button>
  </div>
</header>

<main id="list"></main>

<footer>탭하여 펼치기 · 좌측 원을 눌러 완료 표시</footer>

<script>
const data = [
{
  time:"16:30–16:40", dur:"10분", title:"준비",
  script:`준비물 준비
강단: 타이머, 진행자용 이미지카드
조별배분: 이름표라벨, 이미지카드세트, 마카세트, 포스트잇, 색연필, 스티커, 실천의지기록지(캘리그라피패드 엽서사이즈), 볼펜`,
  ft:""
},
{
  time:"16:40–16:43", dur:"3분", title:"도입",
  script:`오늘 오전부터 자립마인드셋 교육도 듣고, 성교육도 함께 했죠.
강사님들의 이야기를 들으면서 '자립'이라는 단어를 여러 번 들었을 텐데요.
그렇다면 여러분은 자립을 어떤 모습이라고 생각하시나요?

"오늘 활동은 정답을 찾는 시간이 아닙니다. 각자가 생각하는 자립의 모습도 다르고, 준비하고 있는 것도 다르기 때문에 서로의 경험을 듣고 함께 찾아가는 시간이라고 생각해주시면 됩니다."`,
  ft:"좌석·음향 점검, 지각 참여자 안내\n참여자 집중유도"
},
{
  time:"16:43–16:49", dur:"6분", title:"조 구성",
  script:`"서울에서 온 분들은 이쪽, 경북에서 온 분들은 이쪽으로 모여주세요." (기관별 이동)
"각 기관 안에서 태어난 해 순서대로 서보겠습니다." (연령순 정렬)
"서 있는 순서를 참고해서 서로 다른 경험을 나눌 수 있도록 조를 구성했습니다. 안내하는 조로 이동해주세요."`,
  ft:"기관별 이동 동선 안내, 연령순 정렬 보조, 조 이동 시 자리 배치 확인"

{

앞에 있는 라벨지에 이름, 소속(경북인지 서울인지), 요즘 관심있는 것 이렇게 세가지를 적어주세요.
조에서 오늘 아침에 가장 일찍 일어난 사람이 먼저 시작하겠습니다.

질문: 이름 / 어디에서 왔는지 / 요즘 관심 있는 것 하나
(말하는 순서는 진행자가 지정)`,
  ft:"조별 순회하며 침묵하는 조 확인, 필요시 순서 정해주기 지원\n특정 참여자만 계속 이야기하지 않는지 확인"

{
  time:"16:54–16:56", dur:"2분", title:"활동1 안내",
  script:`이번 활동은 '내가 만들어가고 싶은 자립의 모습'을 생각해보는 시간입니다. 누군가는 경제적으로 독립하는 모습일 수도 있고, 누군가는 내가 원하는 삶을 선택하고 책임지는 모습일 수도 있습니다. 앞으로 내가 만들어가고 싶은 자립의 모습은 어떤 모습인지 생각하면서 이미지를 하나 골라보겠습니다.`,
  ft:""
},
{
  time:"16:56–16:58", dur:"2분", title:"활동1 시범",
  script:`"저는 이 그네 사진을 골랐습니다.
처음에는 무서워서 혼자 타지 못했을 것 같아요.
누군가 밀어주는 힘을 빌려 조금씩 타보고,
그러다 어느 순간 혼자 균형을 잡는 방법을 배우게 됩니다.
저는 자립도 이와 비슷하다고 생각합니다.
처음부터 혼자 모든 걸 해내는 것이 아니라,
필요한 도움을 받으면서 경험을 쌓고,
결국에는 스스로 해낼 수 있게 되는 과정이라고 생각했습니다."`,
  ft:"참여자 반응 관찰, 특별한 안내 없음"
},
{
  time:"16:58–17:09", dur:"11분", title:"조별 공유",
  script:`지금부터 이 카드를 고른 이유를 자유롭게 이야기하면 됩니다. 아까는 오늘 아침에 가장 일찍 일어난 사람이 먼저 시작하는데, 이번에는 가장 늦게 일어난 사람 먼저 시작해보겠습니다.

내가 고른 이미지는? / 왜 선택했는지? / 내가 생각하는 자립의 모습은?
"이 모습에서 자립의 어떤 부분이 가장 크게 느껴지나요?"

(막히거나 조용한 조에만 구두로) "예를 들면 경제적인 부분일 수도 있고, 관계나 건강, 마음 쪽일 수도 있어요."`,
  ft:"조별 순회, 침묵/소외되는 참여자 체크, 막힌 조에 순서 정하기 제안"

자립도 경제적인 부분뿐 아니라, 내가 원하는 것을 스스로 판단하고 선택하고, 나를 지키는 것까지 포함될 수 있겠죠.
그렇다면 우리가 원하는 자립의 모습을 만들기 위해 필요한 것은 무엇인지 함께 찾아보겠습니다.`,
  ft:""
},
{
  time:"17:11–17:18", dur:"7분", title:"활동2 NGT",
  script:`"앞으로 내가 원하는 자립을 만들어가기 위해 준비해야 하는 것은 무엇일까요? 하나의 답만 있는 것이 아닙니다. 생각나는 만큼 적어주세요. 포스트잇 한 장에 딱 하나씩 쓰세요. 지금은 침묵하는 시간입니다."

(개인 작성, 조원 간 대화 자제)`,
  ft:"포스트잇·펜 배부, 개인 작성 시간 확보 (대화 유도하지 않기)\n포스트잇 한 장에 한 가지 작성 여부 확인"
},
{
  time:"17:18–17:25", dur:"7분", title:"KJ Method",
  script:`"이제 작성한 내용을 함께 보면서 비슷한 의미끼리 묶어보겠습니다. 이 두 가지는 비슷한 의미라고 볼 수 있을까요? 하나의 키워드로 표현한다면 어떤 말이 좋을까요?"

(개인 포스트잇 원본은 보존, 이동만 함)`,
  ft:"이젤패드 배분\n조별 보드 배치, 포스트잇 분실 방지 확인\n소수 의견도 남을 수 있도록 격려\n포스트잇을 겹쳐 붙이지 않도록 안내"
},
{
  time:"17:25–17:32", dur:"7분", title:"KJ Method (계속)",
  script:`"이 중에서 우리 조 여러 명이 비슷하게 이야기한 건 뭐가 있을까요?"
"혹시 나만 다르게 생각한 것도 있다면 같이 이야기해주세요."
그중에서 가장 많이 나온 키워드는 무엇인가요? 1~2가지만 골라볼까요?
왜 우리 조에서는 이 키워드가 많이 나왔다고 생각하시나요?`,
  ft:"조별 순회, \"나만 다른 의견\" 언급 안 되고 지나가는 조 없는지 확인"
},
{
  time:"17:32–17:40", dur:"8분", title:"Mind map",
  script:`"공통점 찾기에서 나온 키워드 중 가장 많이 겹쳤던 1~2개를 전지 가운데에 적어보겠습니다." (중심 노드 작성)

"이제 이걸 어떻게 준비할 수 있을지, 가지를 뻗어가며 적어보세요. 먼저 조에서 자유롭게 이야기 나눠보세요."

(2~3분 이상 충분히 기다린 후, 막히는 조에만)
"예를 들면 경제관리는 소비 기록하기·저축 계획, 건강관리는 운동 계획·생활습관 점검, 관계는 도움 요청할 사람 찾기 같은 것도 있고, 오전에 다뤘던 것처럼 나의 경계 정하기, 내가 원하는 걸 스스로 판단하는 연습 같은 것도 방법이 될 수 있어요."

"혹시 나만 다르게 생각했던 것이 있다면, 작은 가지로 따로 붙여주셔도 됩니다."`,
  ft:"정답이나 해결책을 제시하기보다 질문을 통해 참여자의 사고를 확장하도록 지원\n\"또 다른 방법은 없을까요? 지금 바로 시작할 수 있는 방법은 무엇일까요?\""
},
{
  time:"17:40–17:46", dur:"6분", title:"개인 실천 선언",

실천선언 카드에 작성해주세요.
나는 _____ 하겠습니다 / 언제 / 어떻게 / 첫번째 행동은?`,
  ft:"개별 조용한 작성 시간 확보, 먼저 끝난 참여자 대기 안내"
},
{
  time:"17:48–18:00", dur:"12분", title:"게시 및 마무리",
  script:`"작성한 실천 약속은 앞쪽 줄에 걸어주세요. 다른 사람이 어떤 선택을 했는지 보면서, 우리 모두 다른 방식으로 자립을 준비하고 있다는 것을 확인해보겠습니다." (걸기)

"오늘 우리가 찾은 자립은 누군가 정해주는 답이 아니라, 내가 어떤 삶을 살고 싶은지 생각하고 준비해가는 과정이라고 생각합니다."

"오늘 선택한 작은 실천이 실제 변화의 시작이 되었으면 좋겠습니다."`,
  ft:"게시판 정리, 전체 사진 촬영, 마무리 다과·정리 준비"
}
];

const list = document.getElementById('list');

data.forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'item';
  item.id = 'item-' + i;

  const head = document.createElement('div');
  head.className = 'item-head';
  head.onclick = (e) => { if(e.target.classList.contains('done-toggle')) return; item.classList.toggle('open'); };

  const doneToggle = document.createElement('div');
  doneToggle.className = 'done-toggle';
  doneToggle.onclick = (e) => { e.stopPropagation(); item.classList.toggle('done'); };

  const badge = document.createElement('div');
  badge.className = 'time-badge';
  badge.textContent = d.time;

  const title = document.createElement('div');
  title.className = 'item-title';
  title.innerHTML = d.title + ' <span class="dur">(' + d.dur + ')</span>';

  const chevron = document.createElement('div');
  chevron.className = 'chevron';
  chevron.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';

  head.appendChild(doneToggle);
  head.appendChild(badge);
  head.appendChild(title);
  head.appendChild(chevron);

  const body = document.createElement('div');
  body.className = 'item-body';

  if(d.script && d.script.trim()){
    const sLabel = document.createElement('div');
    sLabel.className = 'section-label';
    sLabel.textContent = '대본';
    const sBox = document.createElement('div');
    sBox.className = 'script';
    sBox.textContent = d.script;
    body.appendChild(sLabel);
    body.appendChild(sBox);
  }

  if(d.ft && d.ft.trim()){
    const fLabel = document.createElement('div');
    fLabel.className = 'section-label ft-label';
    fLabel.textContent = '보조FT 할일';
    const fBox = document.createElement('div');
    fBox.className = 'ft-box';
    fBox.textContent = d.ft;
    body.appendChild(fLabel);
    body.appendChild(fBox);
  }

  item.appendChild(head);
  item.appendChild(body);
  list.appendChild(item);
});

function toggleAll(open){
  document.querySelectorAll('.item').forEach(el => {
    if(open) el.classList.add('open'); else el.classList.remove('open');
  });
}
</script>

</body>
</html>
